schema_version: "1.0"

extension:
  id: "conduct"
  name: "Conduct Extension"
  version: "1.0.0"
  description: "Orchestrates spec-kit phases via sub-agent delegation to reduce context pollution."
  author: "twbrandon7"
  repository: "https://github.com/twbrandon7/spec-kit-conduct-ext"
  license: "MIT"
  homepage: "https://github.com/twbrandon7/spec-kit-conduct-ext"

requires:
  speckit_version: ">=0.1.0"
  commands:
    - "speckit.specify"
    - "speckit.plan"
    - "speckit.tasks"
    - "speckit.implement"

provides:
  commands:
    - name: "speckit.conduct.run"
      file: "commands/conduct.md"
      description: "Orchestrates complex spec-kit phases by planning and delegating to specialized sub-agents."

tags:
  - "conduct"
  - "workflow"
  - "automation"
