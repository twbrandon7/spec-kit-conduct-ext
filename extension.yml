schema_version: "1.0"

extension:
  id: "orchestration"
  name: "Orchestration Extension"
  version: "1.0.0"
  description: "Orchestration wrapper for Spec Kit that runs the full spec-driven development workflow end-to-end."
  author: "twbrandon7"
  repository: "https://github.com/twbrandon7/spec-kit-orchestration-ext"
  license: "MIT"
  homepage: "https://github.com/twbrandon7/spec-kit-orchestration-ext"

requires:
  speckit_version: ">=0.1.0"
  commands:
    - "speckit.specify"
    - "speckit.plan"
    - "speckit.tasks"
    - "speckit.implement"

provides:
  commands:
    - name: "speckit.orchestration.run"
      file: "commands/orchestration.md"
      description: "Orchestrates complex spec-kit phases by planning and delegating to specialized sub-agents."

tags:
  - "orchestration"
  - "workflow"
  - "automation"
