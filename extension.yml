schema_version: "1.0"

extension:
  id: "orchestration"
  name: "Orchestration Extension"
  version: "1.0.0"
  description: "Orchestration wrapper for Spec Kit that runs the full spec-driven development workflow end-to-end."
  author: "twbrandon7"
  repository: "https://github.com/twbrandon7/spec-kit-orchestration-ext"
  license: "MIT"
  homepage: "https://github.com/twbrandon7/spec-kit-orchestration-ext"

requires:
  speckit_version: ">=0.1.0"
  commands:
    - "speckit.specify"
    - "speckit.plan"
    - "speckit.tasks"
    - "speckit.implement"

provides:
  commands:
    - name: "speckit.orchestration.run"
      file: "commands/run.md"
      description: "Run the full spec-driven development workflow end-to-end"
      aliases: ["speckit.orchestration"]
    - name: "speckit.orchestration.plan"
      file: "commands/plan.md"
      description: "Orchestrate the planning phase: specify → plan → tasks"

tags:
  - "orchestration"
  - "workflow"
  - "automation"
